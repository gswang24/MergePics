<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片合併工具</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖼️</text></svg>">
    <style>
        :root {
            --primary-color: #007BFF;
            --hover-color: #0056b3;
            --bg-color: #f8f9fa;
            --border-color: #dee2e6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h2 { margin-top: 0; text-align: center; color: #222; }
        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
        }
        legend { font-weight: bold; color: #555; padding: 0 5px; }
        .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .radio-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            cursor: pointer;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: var(--hover-color); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #downloadBtn { background-color: #28a745; display: none; }
        #downloadBtn:hover { background-color: #218838; }
        #previewContainer { text-align: center; margin-top: 10px; display: none; }
        #previewContainer img { max-width: 100%; border: 1px solid var(--border-color); border-radius: 6px; }
        .status { text-align: center; font-size: 14px; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🖼️ 圖片合併工具</h2>
        
        <div>
            <label for="imageInput" style="font-weight: bold; margin-bottom: 8px; display: block;">上傳圖片 (請選擇至少 2 張)</label>
            <input type="file" id="imageInput" multiple accept="image/*">
        </div>

        <fieldset>
            <legend>合併方向</legend>
            <div class="radio-group">
                <label><input type="radio" name="direction" value="H" checked> 橫向 (Horizontal)</label>
                <label><input type="radio" name="direction" value="V"> 縱向 (Vertical)</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>儲存格式</legend>
            <div class="radio-group">
                <label><input type="radio" name="format" value="J" checked> JPEG (品質 90%)</label>
                <label><input type="radio" name="format" value="P"> PNG</label>
            </div>
        </fieldset>

        <button id="mergeBtn">開始合併圖片</button>
        <div id="statusMsg" class="status"></div>

        <div id="previewContainer">
            <h3 style="font-size: 16px; margin-bottom: 10px;">預覽圖：</h3>
            <img id="preview" alt="合併後的圖片預覽">
            <br><br>
            <button id="downloadBtn">下載圖片</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('preview');
        const statusMsg = document.getElementById('statusMsg');

        let mergedDataUrl = '';
        let downloadFileName = '';

        mergeBtn.addEventListener('click', async () => {
            const files = imageInput.files;
            
            // 檢查圖片數量
            if (files.length < 2) {
                alert('❌ 錯誤：請確保選擇了至少 2 個圖片檔案。');
                return;
            }

            // 取得使用者設定
            const direction = document.querySelector('input[name="direction"]:checked').value;
            const formatChoice = document.querySelector('input[name="format"]:checked').value;

            mergeBtn.disabled = true;
            statusMsg.textContent = `正在處理 ${files.length} 張圖片，請稍候...`;
            previewContainer.style.display = 'none';

            try {
                // 將所有檔案讀取為 Image 物件
                const loadImages = Array.from(files).map(file => {
                    return new Promise((resolve, reject) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = () => reject(new Error(`無法讀取圖片: ${file.name}`));
                        img.src = URL.createObjectURL(file);
                    });
                });

                const images = await Promise.all(loadImages);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                let totalWidth = 0;
                let totalHeight = 0;

                // 1. 計算 Canvas 總尺寸
                if (direction === 'H') {
                    // 橫向：寬度相加，高度取最大值
                    totalWidth = images.reduce((sum, img) => sum + img.width, 0);
                    totalHeight = Math.max(...images.map(img => img.height));
                } else {
                    // 縱向：高度相加，寬度取最大值
                    totalWidth = Math.max(...images.map(img => img.width));
                    totalHeight = images.reduce((sum, img) => sum + img.height, 0);
                }

                canvas.width = totalWidth;
                canvas.height = totalHeight;

                // 如果是 JPEG 且有透明背景，先填滿白色背景
                if (formatChoice === 'J') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // 2. 依序將圖片畫上 Canvas
                let currentX = 0;
                let currentY = 0;

                images.forEach(img => {
                    ctx.drawImage(img, currentX, currentY);
                    if (direction === 'H') {
                        currentX += img.width;
                    } else {
                        currentY += img.height;
                    }
                });

                // 3. 輸出結果與品質設定
                const mimeType = formatChoice === 'J' ? 'image/jpeg' : 'image/png';
                const quality = formatChoice === 'J' ? 0.9 : undefined; // JPEG 90% 品質
                
                mergedDataUrl = canvas.toDataURL(mimeType, quality);
                
                // 決定檔名
                const baseName = direction === 'H' ? 'merged_horizontal' : 'merged_vertical';
                const ext = formatChoice === 'J' ? '.jpg' : '.png';
                downloadFileName = baseName + ext;

                // 顯示預覽與下載按鈕
                previewImg.src = mergedDataUrl;
                previewContainer.style.display = 'block';
                downloadBtn.style.display = 'block';
                statusMsg.textContent = '✅ 圖片合併成功！';

            } catch (error) {
                console.error(error);
                alert(error.message);
                statusMsg.textContent = '❌ 圖片合併失敗。';
            } finally {
                mergeBtn.disabled = false;
            }
        });

        // 觸發下載
        downloadBtn.addEventListener('click', () => {
            if (!mergedDataUrl) return;
            const a = document.createElement('a');
            a.href = mergedDataUrl;
            a.download = downloadFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
